<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomyCloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #080f14;
        --bg-2: #111f2c;
        --bg-3: #1d1c2a;
        --text: #f2f6fa;
        --muted: #9ab0c3;
        --accent: #ff7a18;
        --accent-2: #ff3d54;
        --accent-3: #36d2ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 20%, rgba(54, 210, 255, 0.2), transparent 30%),
          radial-gradient(circle at 80% 10%, rgba(255, 122, 24, 0.2), transparent 35%),
          radial-gradient(circle at 50% 90%, rgba(255, 61, 84, 0.16), transparent 34%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
        overflow: hidden;
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.06;
        background-image: radial-gradient(circle, #fff 0.6px, transparent 0.6px);
        background-size: 3px 3px;
      }

      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(28px);
        opacity: 0.7;
        pointer-events: none;
        animation: drift 16s ease-in-out infinite alternate;
      }

      .blob.a {
        width: 260px;
        height: 260px;
        background: rgba(54, 210, 255, 0.32);
        left: 6%;
        top: 8%;
      }

      .blob.b {
        width: 340px;
        height: 340px;
        background: rgba(255, 122, 24, 0.3);
        right: 4%;
        top: 4%;
        animation-delay: 2s;
      }

      .blob.c {
        width: 280px;
        height: 280px;
        background: rgba(255, 61, 84, 0.26);
        left: 38%;
        bottom: -8%;
        animation-delay: 4s;
      }

      .hero {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        position: relative;
      }

      .card {
        width: min(860px, 100%);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03));
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(10px);
        text-align: center;
        padding: 48px 28px;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -100%;
        background: linear-gradient(120deg, transparent 35%, rgba(255, 255, 255, 0.2) 50%, transparent 65%);
        animation: sweep 7s linear infinite;
      }

      h1 {
        margin: 0;
        font-family: "Sora", "Space Grotesk", sans-serif;
        font-size: clamp(38px, 8vw, 82px);
        line-height: 0.94;
        letter-spacing: -0.04em;
        position: relative;
        animation: rise 850ms ease both;
      }

      .sub {
        margin: 18px auto 0;
        max-width: 640px;
        font-size: clamp(16px, 2.5vw, 21px);
        line-height: 1.5;
        color: var(--muted);
        position: relative;
        animation: rise 1.1s ease both;
      }

      .equalizer {
        margin: 24px auto 30px;
        height: 34px;
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: flex-end;
        position: relative;
        animation: rise 1.25s ease both;
      }

      .equalizer span {
        width: 7px;
        border-radius: 9px;
        background: linear-gradient(180deg, var(--accent-3), var(--accent));
        animation: wave 1s ease-in-out infinite;
      }

      .equalizer span:nth-child(2n) {
        animation-duration: 1.2s;
      }

      .equalizer span:nth-child(3n) {
        animation-duration: 0.85s;
      }

      .download {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 280px;
        padding: 16px 32px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        text-decoration: none;
        color: #fff;
        font-family: "Sora", "Space Grotesk", sans-serif;
        font-size: clamp(18px, 2.4vw, 24px);
        letter-spacing: 0.02em;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        box-shadow:
          0 14px 40px rgba(255, 74, 54, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        position: relative;
        transform-origin: center;
        animation: popIn 1.45s cubic-bezier(0.2, 0.8, 0.2, 1) both, pulse 2.8s ease-in-out infinite;
        transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      }

      .download:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow:
          0 18px 48px rgba(255, 74, 54, 0.52),
          inset 0 1px 0 rgba(255, 255, 255, 0.32);
        filter: saturate(1.08);
      }

      .download:active {
        transform: translateY(-1px) scale(0.99);
      }

      .hint {
        margin-top: 16px;
        color: var(--muted);
        font-size: 14px;
        position: relative;
        animation: rise 1.6s ease both;
      }

      .hint a {
        color: #ffffff;
      }

      @keyframes wave {
        0%,
        100% {
          height: 7px;
        }
        50% {
          height: 30px;
        }
      }

      @keyframes drift {
        0% {
          transform: translate3d(-10px, 0, 0) scale(1);
        }
        100% {
          transform: translate3d(12px, -14px, 0) scale(1.08);
        }
      }

      @keyframes sweep {
        0% {
          transform: translateX(-58%) rotate(8deg);
        }
        100% {
          transform: translateX(58%) rotate(8deg);
        }
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes popIn {
        0% {
          opacity: 0;
          transform: translateY(24px) scale(0.9);
        }
        70% {
          opacity: 1;
          transform: translateY(-2px) scale(1.02);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow:
            0 14px 40px rgba(255, 74, 54, 0.42),
            inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }
        50% {
          box-shadow:
            0 20px 54px rgba(255, 74, 54, 0.6),
            0 0 0 12px rgba(255, 122, 24, 0.08),
            inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="blob a"></div>
    <div class="blob b"></div>
    <div class="blob c"></div>

    <main class="hero">
      <section class="card">
        <h1>HomyCloud</h1>
        <p class="sub">Красивый десктоп-плеер для SoundCloud. Кнопка ниже скачивает Windows Installer с выбором папки установки.</p>

        <div class="equalizer" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <a class="download" id="downloadInstallerBtn" href="https://github.com/Homychok3/soundcloud-desktop/releases/download/v1.0.0/HomyCloud-Setup-1.0.0.exe" rel="noopener noreferrer">
          Скачать Installer
        </a>
        <div class="hint">Если версия изменилась, открой <a href="https://github.com/Homychok3/soundcloud-desktop/releases/latest">последний релиз</a> и скачай Setup.</div>
      </section>
    </main>
    <script>
      const installerUrl =
        "https://github.com/Homychok3/soundcloud-desktop/releases/download/v1.0.0/HomyCloud-Setup-1.0.0.exe";
      const downloadBtn = document.getElementById("downloadInstallerBtn");
      if (downloadBtn) {
        downloadBtn.addEventListener("click", (event) => {
          event.preventDefault();
          window.location.href = installerUrl;
        });
      }
    </script>
  </body>
</html>
